name: tir_sportif # (package id historique conservé; branding affiché = NexTarget)

description: >
  NexTarget: application mobile pour suivre et analyser les entraînements de tir sportif.

publish_to: 'none'

version: 0.5.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  intl: ^0.20.2
  fl_chart: ^1.1.1
  http: ^1.5.0
  flutter_markdown: ^0.7.7+1
  yaml: ^3.1.3
  file_picker: ^8.0.0
  share_plus: ^7.2.0
  url_launcher: ^6.2.6
  provider: ^6.1.1
  flutter_secure_storage: ^9.0.0
  app_links: ^6.3.3
  # flutter_web_auth_2: ^4.1.0  # Remplacé par url_launcher + app_links
  uuid: ^4.5.1 # dépendance directe (import dans models/goal.dart), était transitive
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  mockito: ^5.5.1
  build_runner: ^2.9.0

flutter_icons:
  android: true
  ios: true
  image_path: assets/app_logo.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/app_logo.png

## Ancien bloc flutter_native_splash supprimé (splash géré par overlay Flutter)

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png # conservé temporairement (legacy)
    - assets/config.yaml
