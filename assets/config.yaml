# NT-061 : plus de bloc `api:` (clé/URL/modèle Mistral) — l'analyse coach
# passe exclusivement par NexTarget-server (auth.base_url ci-dessous).

auth:
  # Feature flag pour activer/désactiver l'authentification
  # false = écran login affiché mais avec bouton skip
  enabled: true
  # URL de base du backend NexTarget pour OAuth2
  base_url: "https://nextarget-server.onrender.com"
  # Custom URL scheme pour intercepter le callback OAuth
  # Backend redirigera vers {callback_scheme}://callback?token=XYZ
  callback_scheme: "nextarget"

splash:
  # Durée minimale d'affichage du splash (en millisecondes)
  min_display_ms: 1500
  # Durée du fade-in de l'application après le splash (en millisecondes)
  fade_duration_ms: 450

calibers:
  - ".22 LR"
  - ".32 S&W Long"
  - "9mm (9x19)"
  - ".38 Special"
  - ".357 Magnum"
  - ".380 ACP"
  - ".40 S&W"
  - ".45 ACP"
  - "Autre"